name: Publish to PyPI

# Triggers on version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — configure once on PyPI:
        #   pypi.org → agent-recall → Publishing → Add trusted publisher
        #   Publisher: GitHub, repo: laurynas-pliuskys/agent-recall
        #   Workflow: publish.yml, Environment: pypi
